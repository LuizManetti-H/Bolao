<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #1e293b;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #16a34a;
      --accent-soft: #dcfce7;
      --header-grad-1: #1e3a8a;
      --header-grad-2: #16a34a;
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f1f5f9;
      color: var(--text);
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .scale-control {
      position: absolute;
      top: 22px;
      left: 10px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 86px;
      height: 28px;
      box-sizing: border-box;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 8px;
      padding: 3px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.25);
    }

    .scale-control button {
      width: 22px;
      height: 22px;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .scale-control button:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .scale-control .scale-value {
      min-width: 29px;
      text-align: center;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    header {
      position: relative;
      background: linear-gradient(120deg, var(--header-grad-1), var(--header-grad-2));
      color: #fff;
      padding: 18px 24px 34px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .admin-button {
      position: absolute;
      top: 16px;
      right: 10px;
      font: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .admin-button:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .admin-button.active {
      background: #f97316;
      border-color: #ea580c;
      color: #fff;
    }

    .admin-button.active:hover {
      background: #ea580c;
    }

    .admin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .admin-overlay[hidden] {
      display: none;
    }

    .admin-modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.3);
      text-align: center;
    }

    .admin-modal h2 {
      margin: 0 0 6px;
      font-size: 1.25rem;
      color: var(--text);
    }

    .admin-modal p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pin-inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .pin-box {
      width: 44px;
      height: 54px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
    }

    .pin-box:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: #fff;
    }

    .pin-error {
      color: #b91c1c !important;
      font-weight: 600;
      margin: 14px 0 0 !important;
    }

    .admin-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 22px;
    }

    .modal-btn {
      font: inherit;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .modal-btn-cancel {
      background: #f1f5f9;
      color: var(--text);
      border-color: var(--border);
    }

    .modal-btn-cancel:hover {
      background: #e2e8f0;
    }

    .modal-btn-confirm {
      background: var(--accent);
      color: #fff;
    }

    .modal-btn-confirm:hover {
      background: #15803d;
    }

    .ranking-modal {
      background: #fff;
      border-radius: 16px;
      padding: 12px 28px 24px;
      width: 100%;
      max-width: 340px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.3);
      text-align: center;
    }

    .ranking-modal h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      color: var(--text);
    }

    .ranking-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .ranking-table th,
    .ranking-table td {
      padding: 0 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      line-height: 17px;
      height: 17px;
    }

    .ranking-table thead th {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #fff;
      background: #1e293b;
      font-weight: 700;
    }

    .ranking-table .rk-pos {
      width: 48px;
      text-align: center;
      font-weight: 700;
      color: var(--text);
    }

    .ranking-table thead .rk-pos,
    .ranking-table thead .rk-name,
    .ranking-table thead .rk-pts {
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      text-align: center;
    }

    .ranking-table .rk-name {
      text-align: center;
      font-weight: 600;
      color: var(--text);
      width: 100px;
    }

    .ranking-table .rk-pts {
      width: 70px;
      text-align: center;
      font-weight: 800;
      color: #000000;
      font-variant-numeric: tabular-nums;
    }

    /* Destaque das linhas do pódio no ranking */
    .ranking-table tbody tr td { background: #ffffff; color: #000000; }
    .ranking-table tbody tr.lead-1 td { background: #0094C8; color: #ffffff; }
    .ranking-table tbody tr.lead-2 td { background: #8BE1FF; color: #000000; }
    .ranking-table tbody tr.lead-3 td { background: #D9F5FF; color: #000000; }

    .ranking-table tbody tr:last-child th,
    .ranking-table tbody tr:last-child td {
      border-bottom: none;
    }

    .ranking-actions {
      margin-top: 20px;
    }

    /* Tabela de Resultados (detalhamento por jogador) */
    .results-modal {
      max-width: 460px;
    }

    .results-table {
      table-layout: fixed;
      width: auto;
      margin-left: auto;
      margin-right: auto;
    }

    .results-table thead th {
      color: #fff;
      white-space: nowrap;
    }

    .results-table thead th[data-sort] {
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .results-table thead th.sort-active {
      text-decoration: none;
    }

    .results-table thead th.sort-active[data-sort-dir="asc"]::after {
      content: "\25B2";
      font-size: 0.6em;
      position: absolute;
      right: 2px;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
    }

    .results-table thead th.sort-active[data-sort-dir="desc"]::after {
      content: "\25BC";
      font-size: 0.6em;
      position: absolute;
      right: 2px;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
    }

    .results-table thead .res-name {
      font-weight: 700;
    }

    .results-table .res-name {
      width: 120px;
      text-align: left;
      font-weight: 600;
      padding: 0 0 0 10px;
    }

    .results-table tbody .res-name {
      color: var(--text);
    }

    .results-table .res-c3,
    .results-table .res-c1,
    .results-table .res-c0,
    .results-table .res-neg,
    .results-table .res-total {
      width: 56px;
      text-align: center;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .results-table tbody .res-c3,
    .results-table tbody .res-c1,
    .results-table tbody .res-c0,
    .results-table tbody .res-neg,
    .results-table tbody .res-total {
      color: #000000;
    }

    .results-table tbody .res-c3 { color: #15803d; }
    .results-table tbody .res-c1 { color: #ca8a04; }
    .results-table tbody .res-neg { color: #b91c1c; }
    .results-table .res-total { font-weight: 800; }

    .results-table tbody tr td { background: #ffffff; }
    .results-table tbody tr:nth-child(even) td { background: #f1f5f9; }

    .results-table tbody tr td { background: #ffffff; }
    .results-table tbody tr:nth-child(even) td { background: #f1f5f9; }

    header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.5px;
    }

    header .subtitle {
      margin: 4px 0 0;
      font-size: 1rem;
      opacity: 0.9;
      font-weight: 500;
    }

    .intro {
      max-width: 1100px;
      margin: -18px auto 0;
      background: var(--card);
      border-radius: 14px;
      height: 60px;
      padding: 0 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      position: relative;
    }

    .intro-placar-btn {
      font: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
      padding: 10px 22px;
      min-width: 125px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12);
      cursor: pointer;
      white-space: nowrap;
    }

    .intro-placar-btn:hover {
      background: #15803d;
    }

    .intro-placar-btn:focus {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 16px;
    }

    .matches-grid {
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .board {
      display: flex;
      align-items: flex-start;
    }

    .name-table {
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
      background: #fff;
      box-shadow: 2px 0 5px rgba(15, 23, 42, 0.12);
    }

    .scroll-area {
      flex: 1 1 auto;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* Cabeçalho flutuante: clone fixo no topo quando a tabela rola para fora */
    .sticky-head {
      position: fixed;
      top: 0;
      z-index: 40;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.18);
      display: none;
    }
    .sticky-head.visible { display: block; }
    .sticky-head .board { display: flex; align-items: flex-start; }
    .sticky-head .name-table {
      flex: 0 0 auto;
      background: #fff;
      box-shadow: 2px 0 5px rgba(15, 23, 42, 0.12);
    }
    .sticky-head .scroll-area {
      flex: 1 1 auto;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .sticky-head .scroll-area::-webkit-scrollbar { display: none; }

    .match-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
    }

    .match-result {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .match-teams {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    .match-teams .team {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
      height: 1.2rem;
      white-space: nowrap;
    }

    .match-teams .team.team-sm {
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .match-teams .team-x {
      line-height: 1.2;
      height: 1.2em;
    }

    .match-time {
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
      font-weight: 600;
    }

    .admin-mode .match-time {
      cursor: pointer;
    }

    .match-time.live {
      background: rgba(220, 38, 38, 0.9);
    }

    .result-box {
      width: 30px;
      height: 30px;
      padding: 0;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      border: none;
      border-radius: 6px;
      background: #fff;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .result-box::-webkit-outer-spin-button,
    .result-box::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .result-box:focus {
      outline: 2px solid var(--accent);
    }

    .result-side {
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }

    .penalty-box {
      width: 20px;
      height: 20px;
      padding: 0;
      text-align: center;
      line-height: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #000000;
      border: none;
      border-radius: 4px;
      background: #fff9c4;
      -moz-appearance: textfield;
      appearance: textfield;
      display: none;
    }

    .match-result.show-penalties .penalty-box {
      display: block;
    }

    .penalty-box::-webkit-outer-spin-button,
    .penalty-box::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .penalty-box:focus {
      outline: 2px solid var(--accent);
    }

    .result-box:disabled {
      background: #fff;
      color: var(--text);
      opacity: 1;
      cursor: default;
    }

    .result-x {
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .admin-mode .result-x {
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .admin-mode .result-x:hover {
      background: #fff;
      color: var(--accent);
    }

    /* Placar em andamento (vermelho) x encerrado (preto, padrão) */
    .match-result.live .result-box,
    .match-result.live .result-box:disabled {
      color: #dc2626;
    }

    .match-date {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .match-date label {
      color: var(--muted);
      font-weight: 600;
    }

    .match-date input[type="date"] {
      font: inherit;
      font-weight: 600;
      color: var(--text);
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      cursor: pointer;
    }

    .match-date input[type="date"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .match-date-label {
      color: var(--text);
      font-weight: 600;
    }

    .date-picker {
      position: relative;
      display: inline-flex;
    }

    .save-status {
      margin-left: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }
    .save-status.saving { color: #b45309; }
    .save-status.saved { color: #15803d; }
    .save-status.error { color: #b91c1c; }

    .date-button {
      font: inherit;
      font-weight: 600;
      color: var(--text);
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      cursor: pointer;
      white-space: nowrap;
      pointer-events: none;
    }

    .date-button:hover {
      border-color: var(--accent);
    }

    .date-button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .date-picker input[type="date"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      z-index: 2;
      -webkit-appearance: none;
      appearance: none;
    }

    table {
      width: max-content;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    thead th {
      text-align: center;
      font-size: 0.85rem;
      padding: 16px 10px;
      background: var(--bg-soft);
      color: #fff;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      width: 135px;
      vertical-align: top;
    }

    thead th:last-child { border-right: none; }

    /* Colunas mais largas a partir da Segunda Fase (28.Jun em diante) */
    .games-table.wide-cols thead th { width: 160px; }

    /* Times em uma única linha ("Time A" x "Time B") a partir da Segunda Fase */
    .games-table.wide-cols .match-teams {
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    /* Bandeira + sigla no mata-mata */
    .team-flag {
      height: 16px;
      width: auto;
      display: block;
      border-radius: 2px;
    }

    /* Siglas em fonte monoespaçada (Red Hat Mono): cada letra ocupa a mesma
       largura, então qualquer sigla de 3 letras fica do mesmo tamanho */
    .team-sigla {
      font-family: "Red Hat Mono", ui-monospace, monospace;
      line-height: 1;
    }

    .games-table.wide-cols .match-teams .team {
      display: flex;
      align-items: center;
      gap: 5px;
      height: auto;
      line-height: 1;
    }

    .games-table.wide-cols .match-teams .team-x {
      display: flex;
      align-items: center;
      height: auto;
      line-height: 1;
      position: relative;
      top: -0.1em;
    }

    .admin-mode .games-table.wide-cols .match-teams .team-x {
      cursor: pointer;
      padding: 0 4px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .admin-mode .games-table.wide-cols .match-teams .team-x:hover {
      background: #fff;
      color: var(--accent);
    }

    thead th.name-col {
      text-align: center;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      vertical-align: bottom;
      width: 135px;
    }

    .name-col-inner {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      height: 100%;
    }

    .phase-label {
      display: block;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
      color: #fff;
      cursor: pointer;
    }

    .name-col-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      font-weight: 700;
      font-size: 0.68rem;
      white-space: nowrap;
      cursor: pointer;
    }

    .name-col-box:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    tbody td {
      padding: 0 10px;
      height: 45px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 0.95rem;
    }

    tbody td:last-child { border-right: none; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(odd) td { background: #ffffff; }
    tbody tr:nth-child(even) td { background: #f1f3f5; }
    tbody tr:nth-child(odd) .name { background: #ffffff; }
    tbody tr:nth-child(even) .name { background: #f1f3f5; }
    tbody tr:hover td,
    tbody tr:hover .name { background: var(--accent-soft); }

    .name {
      font-weight: 600;
      text-align: left;
      white-space: nowrap;

    .pts-pos { background: #dcfce7; color: #15803d; }

    .total-box {

    .tally ul {

    .tally-outcomes {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      gap: 3px;
      margin: 0 0 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #000;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 0.9rem;
      color: #0094C8;
    }

    .tally-side {
      display: inline-flex;

    .tally-left { justify-self: end; }

    .tally-outcome {
      display: inline-block;

        padding-left: 0;

  <script src="data.js"></script>
  <script>
    const { participants, games } = window.BOLAO_DATA;

    const dateInput = document.getElementById("matchDate");
    const container = document.getElementById("matches");
    const noMatches = document.getElementById("noMatches");
    const dateButton = document.getElementById("dateButton");

    // ---- Controle de escala (zoom) da página ----
    const zoomWrap = document.getElementById("zoomWrap");
    const scaleValue = document.getElementById("scaleValue");
    const SCALE_MIN = 0.5;
    const SCALE_MAX = 1.5;
    const SCALE_STEP = 0.1;
    let pageScale = parseFloat(localStorage.getItem("bolaoScale")) || 1;

    function applyScale() {
      pageScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, Math.round(pageScale * 100) / 100));
      zoomWrap.style.transformOrigin = "top left";
      zoomWrap.style.transform = "scale(" + pageScale + ")";
      zoomWrap.style.width = (100 / pageScale) + "%";
      if (stickyHead) {
        stickyHead.style.transformOrigin = "top left";
        stickyHead.style.transform = "scale(" + pageScale + ")";
      }
      // O botão +/- segue uma escala própria (mais suave) em relação à página.
      const scaleControl = document.getElementById("scaleControl");
      if (scaleControl) {
        const pct = Math.round(pageScale * 100);
        let target;
        if (pct >= 100) target = 1.00;
        else if (pct >= 90) target = 0.90;
        else if (pct >= 80) target = 0.85;
        else if (pct >= 70) target = 0.80;
        else if (pct >= 60) target = 0.75;
        else target = 0.70;
        scaleControl.style.transformOrigin = "top left";
        scaleControl.style.transform = "scale(" + (target / pageScale) + ")";
      }
      scaleValue.textContent = Math.round(pageScale * 100) + "%";
      localStorage.setItem("bolaoScale", String(pageScale));
      // Compensa a altura: transform não reflui o layout, então a altura
      // natural precisa ser corrigida para a rolagem refletir o conteúdo escalado.
      requestAnimationFrame(() => {
        document.body.style.height = (zoomWrap.offsetHeight * pageScale) + "px";
        if (typeof updateStickyGeometry === "function") updateStickyGeometry();
        if (typeof updateStickyHeader === "function") updateStickyHeader();
      });
    }

    document.getElementById("scaleMinus").addEventListener("click", () => {
      pageScale -= SCALE_STEP;
      applyScale();
    });
    document.getElementById("scalePlus").addEventListener("click", () => {
      pageScale += SCALE_STEP;
      applyScale();
    });

    const weekdays = [
      "Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira",
      "Quinta-feira", "Sexta-feira", "Sábado"
    ];
    const months = [
      "janeiro", "fevereiro", "março", "abril", "maio", "junho",
      "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"
    ];

    function formatDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      const date = new Date(y, m - 1, d);
      return `${weekdays[date.getDay()]}, ${d} de ${months[m - 1]} de ${y}`;
    }

    // Os horários no data.js estão em EDT (UTC-4). Converte apenas o HORÁRIO de
    // cada jogo para o fuso local do usuário; a data exibida/filtrada permanece
    // sendo a data original (EDT).
    function gameLocalDateTime(g) {
      const [h, mi] = g.t.split(":");
      const hh = String(h).padStart(2, "0");
      const mm = String(mi ?? "0").padStart(2, "0");
      return new Date(`${g.d}T${hh}:${mm}:00-04:00`);
    }
    function toLocalTimeStr(dt) {
      const h = String(dt.getHours()).padStart(2, "0");
      const mi = String(dt.getMinutes()).padStart(2, "0");
      return `${h}:${mi}`;
    }
    // Precomputa a hora local de cada jogo (a data permanece g.d)
    games.forEach(g => {
      g._lt = toLocalTimeStr(gameLocalDateTime(g));
    });

    // Abre o seletor de datas ao clicar na própria data.
    // No desktop, showPicker() abre o calendário; no iOS/Safari o toque direto
    // sobre o input nativo (que fica transparente por cima do box) já o abre.
    dateInput.addEventListener("click", () => {
      if (typeof dateInput.showPicker === "function") {
        try { dateInput.showPicker(); } catch (e) { /* iOS abre nativamente */ }
      }
    });

    // ---- Modo administrativo ----
    const ADMIN_PASSWORD = "HEXABR";
    let adminMode = false;

    // Jogos do mata-mata cujos boxes de pênaltis estão visíveis (alternado pelo admin no "x")
    const penaltyKeys = new Set();

    const adminButton = document.getElementById("adminButton");
    const adminOverlay = document.getElementById("adminOverlay");
    const pinInputs = Array.from(document.querySelectorAll(".pin-box"));
    const pinError = document.getElementById("pinError");
    const adminCancel = document.getElementById("adminCancel");
    const adminConfirm = document.getElementById("adminConfirm");

    function openAdminModal() {
      pinError.hidden = true;
      pinInputs.forEach(i => (i.value = ""));
      adminOverlay.hidden = false;
      pinInputs[0].focus();
    }

    function closeAdminModal() {
      adminOverlay.hidden = true;
    }

    function setAdminMode(on) {
      adminMode = on;
      adminButton.classList.toggle("active", on);
      container.classList.toggle("admin-mode", on);
      updateResultBoxesEditable();
      setSaveStatus("");
      if (container.querySelector(".board")) setupStickyHeader();
    }

    // ---- Persistência dos placares (GitHub) ----
    const GH = {
      owner: "LuizManetti-H",
      repo: "Bolao",
      branch: "main",
      path: "results.json"
    };
    const TOKEN_KEY = "bolaoGhToken";
    const CACHE_KEY = "bolaoResultsCache";

    let resultsData = {};
    const saveStatus = document.getElementById("saveStatus");

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }

    function loadCache() {
      try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveCache() {
      localStorage.setItem(CACHE_KEY, JSON.stringify(resultsData));
    }

    function gameKey(g) {
      return `${g.d}|${g.h}|${g.a}`;
    }

    // Siglas e bandeiras dos times (usadas no mata-mata, a partir de 28.Jun).
    // Chave = nome do time como no data.js; valor = [sigla, arquivo da bandeira].
    const FLAGS_DIR = "flags/";
    const TEAM_INFO = {
      "África do Sul": ["AFS", "AFS - Africa do Sul.png"],
      "Alemanha": ["ALE", "ALE - Alemanha.png"],
      "Argélia": ["ALG", "ALG - Argelia.png"],
      "Arábia Saudita": ["ARA", "ARA - Arabia Saudita.png"],
      "Argentina": ["ARG", "ARG - Argentina.png"],
      "Austrália": ["AUS", "AUS - Australia.png"],
      "Áustria": ["AUT", "AUT - Austria.png"],
      "Bélgica": ["BEL", "BEL - Belgica.png"],
      "Bósnia": ["BOS", "BOS - Bosnia.png"],
      "Bósnia e Herzegovina": ["BOS", "BOS - Bosnia.png"],
      "Brasil": ["BRA", "BRA - Brasil.png"],
      "Canadá": ["CAN", "CAN - Canada.png"],
      "Congo (RD)": ["CON", "CDR - Congo.png"],
      "Costa do Marfim": ["CIV", "CIV - Costa do Marfim.png"],
      "Colômbia": ["COL", "COL - Colombia.png"],
      "Coreia do Sul": ["COR", "COR - Coreia.png"],
      "Croácia": ["CRO", "CRO - Croacia.png"],
      "Curaçao": ["CUR", "CUR - Curacao.png"],
      "Cabo Verde": ["CBV", "CBV - Cabo Verde.png"],
      "Egito": ["EGI", "EGI - Egito.png"],
      "Equador": ["EQU", "EQU - Ecuador.png"],
      "Escócia": ["ESC", "ESC - Escocia.png"],
      "Espanha": ["ESP", "ESP - Espanha.png"],
      "Estados Unidos": ["EUA", "EUA - Estados Unidos.png"],
      "França": ["FRA", "FRA - Franca.png"],
      "Gana": ["GAN", "GAN - Gana.png"],
      "Haiti": ["HAI", "HAI - Haiti.png"],
      "Holanda": ["HOL", "HOL - Holanda.png"],
      "Inglaterra": ["ING", "ING - Inglaterra.png"],
      "Irã": ["IRA", "IRA - Iran.png"],
      "Iraque": ["IRQ", "IRQ - Iraque.png"],
      "Japão": ["JAP", "JAP - Japao.png"],
      "Jordânia": ["JOR", "JOR - Jordania.png"],
      "Marrocos": ["MAR", "MAR - Marrocos.png"],
      "México": ["MEX", "MEX - Mexico.png"],
      "Noruega": ["NOR", "NOR - Noruega.png"],
      "Nova Zelândia": ["NZL", "NZL - Nova Zelandia.png"],
      "Panamá": ["PAN", "PAN - Panama.png"],
      "Paraguai": ["PAR", "PAR - Paraguai.png"],
      "Portugal": ["POR", "POR - Portugal.png"],
      "Catar": ["QAT", "QAT - Catar.png"],
      "Senegal": ["SEN", "SEN - Senegal.png"],
      "Suécia": ["SUE", "SUE - Suecia.png"],
      "Suíça": ["SUI", "SUI - Suica.png"],
      "Suiça": ["SUI", "SUI - Suica.png"],
      "Tchéquia": ["TCH", "TCH - Rep. Tcheca.png"],
      "Rep. Tcheca": ["TCH", "TCH - Rep. Tcheca.png"],
      "Tunísia": ["TUN", "TUN - Tunisia.png"],
      "Turquia": ["TUR", "TUR - Turquia.png"],
      "Uruguai": ["URU", "URU - Uruguai.png"],
      "Uzbequistão": ["UZB", "UZB - Uzbequistao.png"]
    };

    // Placares alterados localmente que ainda podem não ter propagado no CDN público
    const pendingKeys = new Set();

    // Decodifica conteúdo base64 (UTF-8) vindo da API do GitHub
    function fromBase64Utf8(b64) {
      return decodeURIComponent(escape(atob(b64.replace(/\n/g, ""))));
    }

    // Mescla os dados remotos preservando alterações locais ainda pendentes
    function mergeRemote(remote) {
      const merged = remote && typeof remote === "object" ? { ...remote } : {};
      pendingKeys.forEach(k => {
        if (resultsData[k]) merged[k] = resultsData[k];
      });
      resultsData = merged;
      saveCache();
    }

    // Lê os placares publicados no repositório (todos os visitantes)
    async function fetchResults() {
      // Com token, usa a API autenticada (sem cache de CDN) para refletir os salvamentos na hora
      if (getToken()) {
        try {
          const apiUrl = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}?ref=${GH.branch}&t=${Date.now()}`;
          const res = await fetch(apiUrl, { headers: ghHeaders(), cache: "no-store" });
          if (res.ok) {
            const data = await res.json();
            knownSha = data.sha || knownSha;
            mergeRemote(JSON.parse(fromBase64Utf8(data.content)));
            return;
          }
          if (res.status === 404) { mergeRemote({}); return; }
        } catch (e) {
          // cai para a leitura pública abaixo
        }
      }
      try {
        const url = `https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/${GH.branch}/${GH.path}?t=${Date.now()}`;
        const res = await fetch(url, { cache: "no-store" });
        if (res.ok) {
          mergeRemote(await res.json());
        }
      } catch (e) {
        // Sem rede ou ainda não publicado: mantém o cache local
      }
    }

    function toBase64Utf8(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function ghHeaders() {
      return {
        Authorization: `Bearer ${getToken()}`,
        Accept: "application/vnd.github+json"
      };
    }

    function ensureToken() {
      if (getToken()) return true;
      const t = window.prompt(
        "Cole seu token de acesso do GitHub (necessário para salvar os placares):"
      );
      if (t && t.trim()) { setToken(t.trim()); return true; }
      return false;
    }

    let pushTimer = null;
    function schedulePush() {
      saveCache();
      if (pushTimer) clearTimeout(pushTimer);
      pushTimer = setTimeout(() => { pushResults(); }, 800);
    }

    let knownSha = null;
    let pushing = false;
    let pushQueued = false;

    async function getResultsSha() {
      const apiUrl = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}?ref=${GH.branch}&t=${Date.now()}`;
      const res = await fetch(apiUrl, { headers: ghHeaders(), cache: "no-store" });
      if (res.ok) { return (await res.json()).sha; }
      if (res.status === 404) { return null; }
      return null;
    }

    async function pushResults() {
      if (!getToken() && !ensureToken()) {
        setSaveStatus("error");
        return;
      }
      // Evita salvamentos simultâneos: enfileira e roda em sequência
      if (pushing) { pushQueued = true; return; }
      pushing = true;
      setSaveStatus("saving");
      try {
        const ok = await doPush(true);
        if (ok) setSaveStatus("saved");
      } catch (e) {
        console.error(e);
        setSaveStatus("error");
        window.alert("Erro de rede ao salvar: " + e.message);
      } finally {
        pushing = false;
        if (pushQueued) {
          pushQueued = false;
          pushResults();
        }
      }
    }

    // Faz o PUT; em caso de conflito de sha (409) relê o sha e tenta de novo
    async function doPush(allowRetry) {
      if (knownSha === null) {
        knownSha = await getResultsSha();
      }
      const apiUrl = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`;
      const body = {
        message: "Atualiza placares",
        content: toBase64Utf8(JSON.stringify(resultsData, null, 2)),
        branch: GH.branch
      };
      if (knownSha) body.sha = knownSha;

      const res = await fetch(apiUrl, {
        method: "PUT",
        headers: { ...ghHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        const data = await res.json();
        knownSha = data && data.content ? data.content.sha : null;
        pendingKeys.clear();
        return true;
      }

      // Conflito de versão: relê o sha atual e tenta uma vez mais
      if ((res.status === 409 || res.status === 422) && allowRetry) {
        knownSha = await getResultsSha();
        return doPush(false);
      }

      let detail = "";
      try { detail = (await res.json()).message || ""; } catch {}
      console.error("Falha ao salvar no GitHub:", res.status, detail);

      if (res.status === 401 || res.status === 403) {
        clearToken();
        knownSha = null;
        setSaveStatus("error");
        window.alert(
          `GitHub recusou o token (HTTP ${res.status}).\n` +
          `Mensagem: ${detail}\n\n` +
          `Verifique se o token é fine-grained, com permissão "Contents: Read and write" ` +
          `no repositório ${GH.owner}/${GH.repo}. Informe o token novamente ao salvar.`
        );
        return false;
      }

      setSaveStatus("error");
      window.alert(
        `Erro ao salvar (HTTP ${res.status}).\n` +
        `Mensagem: ${detail}\n\n` +
        `Confira se o repositório "${GH.repo}", o dono "${GH.owner}" e a branch "${GH.branch}" estão corretos.`
      );
      return false;
    }

    function setSaveStatus(state) {
      if (!saveStatus) return;
      if (!adminMode || !state) { saveStatus.textContent = ""; saveStatus.className = "save-status"; return; }
      const map = { saving: "Salvando…", saved: "Salvo ✓", error: "Erro ao salvar" };
      saveStatus.textContent = map[state] || "";
      saveStatus.className = "save-status " + state;
    }

    function updateResultBoxesEditable() {
      container.querySelectorAll(".result-box").forEach(input => {
        input.disabled = !adminMode;
      });
    }

    // Aplica o status do jogo: "live" deixa o placar vermelho; o padrão (encerrado) deixa preto.
    function applyMatchStatus(key) {
      const isLive = !!(resultsData[key] && resultsData[key].status === "live");
      [container, stickyHead].forEach(root => {
        if (!root) return;
        root.querySelectorAll(`.match-time[data-key="${key}"]`).forEach(t => t.classList.toggle("live", isLive));
        root.querySelectorAll(`.match-result[data-key="${key}"]`).forEach(r => r.classList.toggle("live", isLive));
      });
    }

    // Retorna true se o jogo tem placar preenchido e empatado (gols iguais).
    function isGameTied(key) {
      const h = container.querySelector(`.result-box[data-key="${key}"][data-side="h"]`);
      const a = container.querySelector(`.result-box[data-key="${key}"][data-side="a"]`);
      if (!h || !a || h.value === "" || a.value === "") return false;
      return parseInt(h.value, 10) === parseInt(a.value, 10);
    }

    // Oculta os boxes de pênaltis de um jogo (em ambas as tabelas) e desmarca a chave.
    function hidePenalties(key) {
      penaltyKeys.delete(key);
      [container, stickyHead].forEach(root => {
        if (!root) return;
        root.querySelectorAll(`.match-result[data-key="${key}"]`).forEach(r => r.classList.remove("show-penalties"));
      });
    }

    adminButton.addEventListener("click", () => {
      if (adminMode) {
        setAdminMode(false);
      } else {
        openAdminModal();
      }
    });

    adminCancel.addEventListener("click", closeAdminModal);

    function submitPin() {
      const entered = pinInputs.map(i => i.value).join("");
      if (entered.toUpperCase() === ADMIN_PASSWORD) {
        setAdminMode(true);
        closeAdminModal();
        ensureToken();
      } else {
        pinError.hidden = false;
        pinInputs.forEach(i => (i.value = ""));
        pinInputs[0].focus();
      }
    }

    adminConfirm.addEventListener("click", submitPin);

    pinInputs.forEach((input, idx) => {
      input.addEventListener("input", () => {
        if (input.value && idx < pinInputs.length - 1) {
          pinInputs[idx + 1].focus();
        }
        if (pinInputs.every(i => i.value)) {
          submitPin();
        }
      });
      input.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !input.value && idx > 0) {
          pinInputs[idx - 1].focus();
        } else if (e.key === "Enter") {
          submitPin();
        }
      });
    });

    adminOverlay.addEventListener("click", e => {
      if (e.target === adminOverlay) closeAdminModal();
    });

    // ---- Ranking (Placar Geral) ----
    const rankingOverlay = document.getElementById("rankingOverlay");
    const rankingBody = document.getElementById("rankingBody");
    const rankingModal = document.getElementById("rankingModal");

    function openRanking() {
      const rows = participants
        .map((name, i) => ({ name, pts: computeParticipantTotal(i) }))
        .sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name, "pt-BR"));

      let lastPts = null;
      let lastPos = 0;
      rankingBody.innerHTML = rows.map((r) => {
        // Mesma pontuação compartilha a mesma posição; a próxima é sequencial
        const pos = r.pts === lastPts ? lastPos : lastPos + 1;
        lastPts = r.pts;
        lastPos = pos;
        const leadClass = pos === 1 ? " class=\"lead-1\""
          : pos === 2 ? " class=\"lead-2\""
          : pos === 3 ? " class=\"lead-3\""
          : "";
        return `
          <tr${leadClass}>
            <td class="rk-pos">${pos}</td>
            <td class="rk-name">${r.name}</td>
            <td class="rk-pts">${r.pts}</td>
          </tr>`;
      }).join("");

      rankingModal.style.transform = "none";
      rankingOverlay.hidden = false;

      // O ranking ignora a escala da página (botão +/−): sempre exibido a 100%.
      requestAnimationFrame(() => {
        rankingModal.style.maxHeight = (window.innerHeight * 0.96) + "px";
        rankingModal.style.transformOrigin = "center center";
        rankingModal.style.transform = "none";
      });
    }

    function closeRanking() {
      rankingOverlay.hidden = true;
    }

    rankingOverlay.addEventListener("click", e => {
      if (e.target === rankingOverlay) closeRanking();
    });

    // ---- Resultados (detalhamento de pontos por jogador) ----
    const resultsOverlay = document.getElementById("resultsOverlay");
    const resultsBody = document.getElementById("resultsBody");
    const resultsModal = document.getElementById("resultsModal");

    // Estado de ordenação da tabela de Resultados
    let resultsSortKey = "name";
    let resultsSortDir = "asc";

    function renderResultsRows() {
      const rows = participants
        .map((name, i) => ({ name, ...computeParticipantBreakdown(i) }));

      const key = resultsSortKey;
      const dir = resultsSortDir === "asc" ? 1 : -1;
      rows.sort((a, b) => {
        if (key === "name") {
          return a.name.localeCompare(b.name, "pt-BR") * dir;
        }
        const diff = (a[key] - b[key]) * dir;
        if (diff !== 0) return diff;
        return a.name.localeCompare(b.name, "pt-BR");
      });

      resultsBody.innerHTML = rows.map((r) => `
          <tr>
            <td class="res-name">${r.name}</td>
            <td class="res-c3">${r.c3}</td>
            <td class="res-c1">${r.c1}</td>
            <td class="res-c0">${r.c0}</td>
            <td class="res-neg">${r.cNeg}</td>
          </tr>`).join("");

      // Marca visualmente a coluna ordenada e a direção
      resultsModal.querySelectorAll("thead th[data-sort]").forEach(th => {
        th.classList.toggle("sort-active", th.dataset.sort === resultsSortKey);
        th.dataset.sortDir = th.dataset.sort === resultsSortKey ? resultsSortDir : "";
      });
    }

    function openResults() {
      renderResultsRows();

      resultsModal.style.transform = "none";
      resultsOverlay.hidden = false;

      // A tabela de Resultados ignora a escala da página: sempre exibida a 100%.
      requestAnimationFrame(() => {
        resultsModal.style.maxHeight = (window.innerHeight * 0.96) + "px";
        resultsModal.style.transformOrigin = "center center";
        resultsModal.style.transform = "none";
      });
    }

    function closeResults() {
      resultsOverlay.hidden = true;
    }

    resultsOverlay.addEventListener("click", e => {
      if (e.target === resultsOverlay) closeResults();
    });

    // Clique no cabeçalho ordena pela coluna selecionada (alterna asc/desc)
    resultsModal.querySelector("thead").addEventListener("click", e => {
      const th = e.target.closest("th[data-sort]");
      if (!th) return;
      const key = th.dataset.sort;
      if (key === resultsSortKey) {
        resultsSortDir = resultsSortDir === "asc" ? "desc" : "asc";
      } else {
        resultsSortKey = key;
        // Nome começa em ordem alfabética; colunas numéricas, do maior para o menor
        resultsSortDir = key === "name" ? "asc" : "desc";
      }
      renderResultsRows();
    });

    // Clique no cabeçalho "Placar Geral" abre o ranking
    container.addEventListener("click", e => {
      if (e.target.closest(".name-col-box")) openRanking();
      else if (e.target.closest(".phase-label")) openResults();
    });

    // Botão "Placar Geral" da seção de introdução abre o ranking
    const introPlacarBtn = document.getElementById("introPlacarBtn");
    if (introPlacarBtn) {
      introPlacarBtn.addEventListener("click", openRanking);
    }

    // Realça o palpite clicado no rodapé, o nome do jogador e o palpite dele
    // para o jogo. Clicar em qualquer outro lugar da tela limpa o destaque.
    function clearTallyHighlight() {
      document
        .querySelectorAll(".tally-score.highlight, .tally-outcome.highlight, .name.highlight, .score.highlight")
        .forEach(el => el.classList.remove("highlight"));
    }

    document.addEventListener("click", e => {
      const outcome = e.target.closest(".tally-outcome");
      const tally = e.target.closest(".tally-score");
      const wasActive = (tally || outcome) && (tally || outcome).classList.contains("highlight");
      clearTallyHighlight();
      if (wasActive) return;

      if (outcome) {
        const gIndex = outcome.dataset.game;
        const want = outcome.dataset.outcome; // "h" | "d" | "a"
        outcome.classList.add("highlight");
        container
          .querySelectorAll(`.score[data-game="${gIndex}"]`)
          .forEach(cell => {
            const parsed = parseScore(cell.dataset.pred);
            if (!parsed) return;
            const res = parsed[0] > parsed[1] ? "h" : parsed[0] < parsed[1] ? "a" : "d";
            if (res !== want) return;
            cell.classList.add("highlight");
            const p = cell.dataset.participant;
            const nameCell = container.querySelector(`.name[data-participant="${p}"]`);
            if (nameCell) nameCell.classList.add("highlight");
          });
        return;
      }

      if (!tally) return;
      const gIndex = tally.dataset.game;
      const score = tally.dataset.score;
      tally.classList.add("highlight");
      container
        .querySelectorAll(`.score[data-game="${gIndex}"][data-pred="${score}"]`)
        .forEach(cell => {
          cell.classList.add("highlight");
          const p = cell.dataset.participant;
          const nameCell = container.querySelector(`.name[data-participant="${p}"]`);
          if (nameCell) nameCell.classList.add("highlight");
        });
    });

    // Sincroniza a altura do cabeçalho e do rodapé da coluna fixa com a tabela de jogos
    function syncBoardHeights() {
      const nameTable = container.querySelector(".name-table");
      const gamesTable = container.querySelector(".games-table");
      if (!nameTable || !gamesTable) return;
      const nHead = nameTable.querySelector("thead th");
      const nFoot = nameTable.querySelector("tfoot td");
      const gHeadRow = gamesTable.querySelector("thead tr");
      const gFootRow = gamesTable.querySelector("tfoot tr");
      nHead.style.height = "auto";
      nFoot.style.height = "auto";
      // getBoundingClientRect retorna alturas já escaladas pelo transform;
      // divide pela escala para obter a altura natural antes de reaplicar.
      const s = (typeof pageScale === "number" && pageScale) ? pageScale : 1;
      const headH = gHeadRow.getBoundingClientRect().height / s;
      const footH = gFootRow.getBoundingClientRect().height / s;
      nHead.style.height = headH + "px";
      nFoot.style.height = footH + "px";
    }

    window.addEventListener("resize", syncBoardHeights);

    // ---- Cabeçalho flutuante (sticky via JS, robusto no iOS) ----
    let stickyHead = null;
    let stickyScroll = null;

    function teardownStickyHeader() {
      if (stickyHead) {
        stickyHead.remove();
        stickyHead = null;
        stickyScroll = null;
      }
    }

    function setupStickyHeader() {
      teardownStickyHeader();
      const board = container.querySelector(".board");
      const nameTable = container.querySelector(".name-table");
      const gamesTable = container.querySelector(".games-table");
      const realScroll = container.querySelector(".scroll-area");
      if (!board || !nameTable || !gamesTable || !realScroll) return;

      stickyHead = document.createElement("div");
      stickyHead.className = "sticky-head";
      stickyHead.style.transformOrigin = "top left";
      stickyHead.style.transform = "scale(" + pageScale + ")";

      const cloneBoard = document.createElement("div");
      cloneBoard.className = "board";

      const cloneNameTable = document.createElement("table");
      cloneNameTable.className = "name-table";
      cloneNameTable.appendChild(nameTable.querySelector("thead").cloneNode(true));

      stickyScroll = document.createElement("div");
      stickyScroll.className = "scroll-area";
      const cloneGamesTable = document.createElement("table");
      cloneGamesTable.className = gamesTable.className;
      cloneGamesTable.appendChild(gamesTable.querySelector("thead").cloneNode(true));
      if (adminMode) cloneGamesTable.classList.add("admin-mode");
      stickyScroll.appendChild(cloneGamesTable);

      cloneBoard.appendChild(cloneNameTable);
      cloneBoard.appendChild(stickyScroll);
      stickyHead.appendChild(cloneBoard);
      document.body.appendChild(stickyHead);

      // Espelha a edição de placar feita no cabeçalho flutuante para os campos reais
      stickyHead.querySelectorAll(".result-box").forEach(cloneInput => {
        cloneInput.disabled = !adminMode;
        const key = cloneInput.dataset.key;
        const side = cloneInput.dataset.side;
        cloneInput.addEventListener("input", () => {
          const real = container.querySelector(`.result-box[data-key="${key}"][data-side="${side}"]`);
          if (real) {
            real.value = cloneInput.value;
            real.dispatchEvent(new Event("input", { bubbles: true }));
          }
        });
      });
      // Espelha a edição dos pênaltis feita no cabeçalho flutuante
      stickyHead.querySelectorAll(".penalty-box").forEach(cloneInput => {
        const key = cloneInput.dataset.key;
        const side = cloneInput.dataset.side;
        cloneInput.addEventListener("input", () => {
          const real = container.querySelector(`.penalty-box[data-key="${key}"][data-side="${side}"]`);
          if (real) {
            real.value = cloneInput.value;
            real.dispatchEvent(new Event("input", { bubbles: true }));
          }
        });
      });
      stickyHead.querySelectorAll(".result-x").forEach(cloneX => {
        const key = cloneX.dataset.key;
        cloneX.addEventListener("click", () => {
          const real = container.querySelector(`.result-x[data-key="${key}"]`);
          if (real) real.click();
          syncStickyInputs();
        });
      });

      // Espelha o clique no "x" do nome do jogo (mostra/oculta pênaltis)
      stickyHead.querySelectorAll(".team-x").forEach(cloneX => {
        const key = cloneX.dataset.key;
        cloneX.addEventListener("click", () => {
          const real = container.querySelector(`.team-x[data-key="${key}"]`);
          if (real) real.click();
        });
      });

      // Espelha o clique no horário (alterna o status do jogo)
      stickyHead.querySelectorAll(".match-time").forEach(cloneT => {
        const key = cloneT.dataset.key;
        cloneT.addEventListener("click", () => {
          const real = container.querySelector(`.match-time[data-key="${key}"]`);
          if (real) real.click();
        });
      });

      // Clicar no "Placar Geral" do cabeçalho flutuante também abre o ranking
      const cloneNameBox = stickyHead.querySelector(".name-col-box");
      if (cloneNameBox) {
        cloneNameBox.addEventListener("click", openRanking);
      }

      // Clicar na fase ("Primeira Fase", etc.) do cabeçalho flutuante abre os Resultados
      const clonePhaseLabel = stickyHead.querySelector(".phase-label");
      if (clonePhaseLabel) {
        clonePhaseLabel.addEventListener("click", openResults);
      }

      // Mantém a rolagem horizontal do clone sincronizada com a tabela real
      realScroll.addEventListener("scroll", () => {
        if (stickyScroll) stickyScroll.scrollLeft = realScroll.scrollLeft;
      });
      stickyScroll.addEventListener("scroll", () => {
        realScroll.scrollLeft = stickyScroll.scrollLeft;
      });

      updateStickyGeometry();
      updateStickyHeader();
    }

    function syncStickyInputs() {
      if (!stickyHead) return;
      stickyHead.querySelectorAll(".result-box").forEach(cloneInput => {
        const key = cloneInput.dataset.key;
        const side = cloneInput.dataset.side;
        const real = container.querySelector(`.result-box[data-key="${key}"][data-side="${side}"]`);
        if (real) cloneInput.value = real.value;
      });
      stickyHead.querySelectorAll(".penalty-box").forEach(cloneInput => {
        const key = cloneInput.dataset.key;
        const side = cloneInput.dataset.side;
        const real = container.querySelector(`.penalty-box[data-key="${key}"][data-side="${side}"]`);
        if (real) cloneInput.value = real.value;
      });
    }

    function updateStickyGeometry() {
      if (!stickyHead) return;
      const realScroll = container.querySelector(".scroll-area");
      const rect = container.getBoundingClientRect();
      // O clone usa transform: scale (origem top-left). O left (fixed) não é
      // escalado, mas a largura interna sim — então divide só a largura.
      const s = pageScale || 1;
      stickyHead.style.left = rect.left + "px";
      stickyHead.style.width = (rect.width / s) + "px";
      if (realScroll && stickyScroll) {
        stickyScroll.scrollLeft = realScroll.scrollLeft;
      }
    }

    function updateStickyHeader() {
      if (!stickyHead) return;
      const board = container.querySelector(".board");
      if (!board) return;
      const rect = board.getBoundingClientRect();
      const headH = (stickyHead.offsetHeight || 0) * (pageScale || 1);
      const shouldShow = rect.top < 0 && rect.bottom > headH + 4;
      if (shouldShow) {
        if (!stickyHead.classList.contains("visible")) {
          stickyHead.classList.add("visible");
          syncStickyInputs();
        }
        updateStickyGeometry();
      } else {
        stickyHead.classList.remove("visible");
      }
    }

    window.addEventListener("scroll", updateStickyHeader, { passive: true });
    window.addEventListener("resize", () => {
      updateStickyGeometry();
      updateStickyHeader();
    });

    function render() {
      const selected = dateInput.value;
      dateButton.textContent = formatDate(selected);
      const dayGames = games.filter(g => g.d === selected);

      if (dayGames.length === 0) {
        container.innerHTML = "";
        noMatches.hidden = false;
        teardownStickyHeader();
        return;
      }
      noMatches.hidden = true;

      // Nomes longos que recebem fonte reduzida para caber em uma linha
      const longNames = new Set(["Costa do Marfim", "Arábia Saudita", "Nova Zelândia", "Estados Unidos"]);
      const teamClass = name => "team" + (longNames.has(name) ? " team-sm" : "");

      // A partir da Segunda Fase (28.Jun) os confrontos usam bandeira + sigla
      const isKnockout = selected >= "2026-06-28";
      // Renderiza um time: mandante = bandeira + sigla; visitante = sigla + bandeira.
      // Se o time não estiver no mapa (ex.: placeholders "2A", "W73"), usa o texto.
      function renderTeam(name, side) {
        const info = isKnockout ? TEAM_INFO[name] : null;
        if (!info) {
          // No mata-mata, placeholders (ex.: "1C", "W73") usam a mesma formatação das siglas
          if (isKnockout) return `<span class="team"><span class="team-sigla">${name}</span></span>`;
          return `<span class="${teamClass(name)}">${name}</span>`;
        }
        const img = `<img class="team-flag" src="${FLAGS_DIR}${encodeURIComponent(info[1])}" alt="${name}">`;
        const sig = `<span class="team-sigla">${info[0]}</span>`;
        return `<span class="team">${side === "h" ? img + sig : sig + img}</span>`;
      }

      // Cabeçalho: coluna de nomes + uma coluna por jogo
      const headerCells = dayGames.map((g, gIndex) => `
        <th>
          <div class="match-header">
            <span class="match-time" data-game="${gIndex}" data-key="${gameKey(g)}">${g._lt}</span>
            <span class="match-teams">
              ${renderTeam(g.h, "h")}
              <span class="team-x" data-game="${gIndex}" data-key="${gameKey(g)}">x</span>
              ${renderTeam(g.a, "a")}
            </span>
            <span class="match-result${penaltyKeys.has(gameKey(g)) ? " show-penalties" : ""}" data-key="${gameKey(g)}">
              <span class="result-side">
                ${isKnockout ? `<input type="number" min="0" class="penalty-box" data-game="${gIndex}" data-side="h" data-key="${gameKey(g)}" aria-label="Pênaltis ${g.h}" />` : ""}
                <input type="number" min="0" class="result-box" data-game="${gIndex}" data-side="h" data-key="${gameKey(g)}" aria-label="Gols ${g.h}" />
              </span>
              <span class="result-x" data-game="${gIndex}" data-key="${gameKey(g)}">x</span>
              <span class="result-side">
                <input type="number" min="0" class="result-box" data-game="${gIndex}" data-side="a" data-key="${gameKey(g)}" aria-label="Gols ${g.a}" />
                ${isKnockout ? `<input type="number" min="0" class="penalty-box" data-game="${gIndex}" data-side="a" data-key="${gameKey(g)}" aria-label="Pênaltis ${g.a}" />` : ""}
              </span>
            </span>
          </div>
        </th>`).join("");

      // Linhas: nome do jogador + palpite em cada jogo
      const nameRows = participants.map((name, pIndex) => `
          <tr>
            <td class="name" data-participant="${pIndex}">
              <span class="name-label">${name}</span>
              <span class="total-box" data-participant="${pIndex}">0</span>
            </td>
          </tr>`).join("");

      const scoreRows = participants.map((name, pIndex) => {
        const cells = dayGames.map((g, gIndex) =>
          `<td class="score" data-game="${gIndex}" data-participant="${pIndex}" data-pred="${g.p[pIndex]}">
            <span class="pred">${g.p[pIndex].replace(/x/i, '<span class="pred-x">x</span>')}</span>
            <span class="pts" data-game="${gIndex}" data-pred="${g.p[pIndex]}"></span>
          </td>`
        ).join("");
        return `<tr>${cells}</tr>`;
      }).join("");

      // Rodapé: resumo de palpites por jogo, do mais ao menos votado
      const footerCells = dayGames.map((g, gIndex) => {
        const counts = {};
        let homeWins = 0, draws = 0, awayWins = 0;
        g.p.forEach(score => {
          counts[score] = (counts[score] || 0) + 1;
          const parsed = parseScore(score);
          if (parsed) {
            if (parsed[0] > parsed[1]) homeWins++;
            else if (parsed[0] < parsed[1]) awayWins++;
            else draws++;
          }
        });
        const outcomes = `
          <div class="tally-outcomes">
            <span class="tally-side tally-left"><span class="tally-outcome" data-game="${gIndex}" data-outcome="h">${homeWins}</span><span class="tally-sep">-</span></span>
            <span class="tally-outcome" data-game="${gIndex}" data-outcome="d">${draws}</span>
            <span class="tally-side tally-right"><span class="tally-sep">-</span><span class="tally-outcome" data-game="${gIndex}" data-outcome="a">${awayWins}</span></span>
          </div>`;
        const summary = Object.entries(counts)
          .sort((a, b) => b[1] - a[1])
          .map(([score, qty]) => `
            <li>
              <span class="tally-score" data-game="${gIndex}" data-score="${score}">${score}</span>
              <span class="tally-qty">${qty}</span>
            </li>`).join("");
        return `<td class="tally">${outcomes}<ul>${summary}</ul></td>`;
      }).join("");

      // Rótulo da fase exibido no topo da coluna de jogadores
      const phaseLabel =
          (selected >= "2026-06-11" && selected <= "2026-06-27") ? "Primeira Fase"
        : (selected >= "2026-06-28" && selected <= "2026-07-03") ? "Segunda Fase"
        : (selected >= "2026-07-04" && selected <= "2026-07-07") ? "Oitavas de Final"
        : (selected >= "2026-07-08" && selected <= "2026-07-11") ? "Quartas de Final"
        : (selected >= "2026-07-12" && selected <= "2026-07-15") ? "Semifinais"
        : (selected >= "2026-07-16" && selected <= "2026-07-18") ? "3º e 4º Lugares"
        : (selected === "2026-07-19") ? "Final"
        : "";

      container.innerHTML = `
        <div class="board">
          <table class="name-table">
            <thead>
              <tr>
                <th class="name-col"><div class="name-col-inner"><span class="phase-label">${phaseLabel}</span></div></th>
              </tr>
            </thead>
            <tbody>${nameRows}</tbody>
            <tfoot>
              <tr>
                <td class="tally-label">Palpites</td>
              </tr>
            </tfoot>
          </table>
          <div class="scroll-area">
            <table class="games-table${selected >= "2026-06-28" ? " wide-cols" : ""}">
              <thead>
                <tr>${headerCells}</tr>
              </thead>
              <tbody>${scoreRows}</tbody>
              <tfoot>
                <tr>${footerCells}</tr>
              </tfoot>
            </table>
          </div>
        </div>`;

      syncBoardHeights();
      requestAnimationFrame(syncBoardHeights);

      // Recalcula os scores e liga os eventos dos campos de placar
      container.querySelectorAll(".result-box").forEach(input => {
        const key = input.dataset.key;
        const side = input.dataset.side;
        const val = resultsData[key] && resultsData[key][side];
        if (val !== undefined && val !== null && val !== "") {
          input.value = val;
        }
        input.addEventListener("input", () => {
          const k = input.dataset.key;
          if (!resultsData[k]) resultsData[k] = { h: "", a: "" };
          resultsData[k][input.dataset.side] = input.value;
          pendingKeys.add(k);
          recomputeGame(input.dataset.game);
          // Se o jogo deixou de estar empatado, oculta os pênaltis automaticamente.
          if (penaltyKeys.has(k) && !isGameTied(k)) hidePenalties(k);
          schedulePush();
        });
      });

      // Carrega valores e liga os eventos dos campos de pênaltis (mata-mata)
      container.querySelectorAll(".penalty-box").forEach(input => {
        const key = input.dataset.key;
        const pkey = input.dataset.side === "h" ? "ph" : "pa";
        const val = resultsData[key] && resultsData[key][pkey];
        if (val !== undefined && val !== null && val !== "") {
          input.value = val;
        }
        input.addEventListener("input", () => {
          const k = input.dataset.key;
          if (!resultsData[k]) resultsData[k] = { h: "", a: "" };
          resultsData[k][pkey] = input.value;
          pendingKeys.add(k);
          schedulePush();
        });
      });

      // Clicar no "x" central zera o placar do jogo, inclusive pênaltis (somente admin)
      container.querySelectorAll(".result-x").forEach(x => {
        x.addEventListener("click", () => {
          if (!adminMode) return;
          const k = x.dataset.key;
          resultsData[k] = { h: "", a: "" };
          pendingKeys.add(k);
          [container, stickyHead].forEach(root => {
            if (!root) return;
            root.querySelectorAll(`.result-box[data-key="${k}"]`).forEach(inp => { inp.value = ""; });
            root.querySelectorAll(`.penalty-box[data-key="${k}"]`).forEach(inp => { inp.value = ""; });
          });
          hidePenalties(k);
          recomputeGame(x.dataset.game);
          schedulePush();
        });
      });

      // Clicar no horário alterna o status do jogo (somente admin):
      // em andamento (placar vermelho) <-> encerrado (placar preto)
      container.querySelectorAll(".match-time").forEach(t => {
        t.addEventListener("click", () => {
          if (!adminMode) return;
          const k = t.dataset.key;
          if (!resultsData[k]) resultsData[k] = { h: "", a: "" };
          const isLive = resultsData[k].status === "live";
          resultsData[k].status = isLive ? "finished" : "live";
          pendingKeys.add(k);
          applyMatchStatus(k);
          schedulePush();
        });
      });

      // Clicar no "x" do nome do jogo mostra/oculta os boxes de pênaltis
      // (somente admin, mata-mata e apenas se o placar estiver empatado)
      container.querySelectorAll(".team-x").forEach(x => {
        x.addEventListener("click", () => {
          if (!adminMode || !isKnockout) return;
          const k = x.dataset.key;
          const currentlyShown = penaltyKeys.has(k);
          // Só permite habilitar os pênaltis quando o jogo está empatado.
          if (!currentlyShown && !isGameTied(k)) return;
          if (currentlyShown) penaltyKeys.delete(k); else penaltyKeys.add(k);
          const show = penaltyKeys.has(k);
          [container, stickyHead].forEach(root => {
            if (!root) return;
            root.querySelectorAll(`.match-result[data-key="${k}"]`).forEach(r => r.classList.toggle("show-penalties", show));
          });
        });
      });

      updateResultBoxesEditable();
      dayGames.forEach((g, gIndex) => {
        recomputeGame(gIndex);
        applyMatchStatus(gameKey(g));
      });
      requestAnimationFrame(() => {
        setupStickyHeader();
        if (typeof applyScale === "function") applyScale();
      });
    }

    // Converte "2 x 1" em [2, 1]; retorna null se inválido
    function parseScore(text) {
      const m = String(text).split("x");
      if (m.length !== 2) return null;
      const h = parseInt(m[0], 10);
      const a = parseInt(m[1], 10);
      if (Number.isNaN(h) || Number.isNaN(a)) return null;
      return [h, a];
    }

    // Pontuação: placar exato = 3, placar invertido = -2, só vencedor = 1, erro = 0
    function computePoints(pred, result) {
      const [ph, pa] = pred;
      const [rh, ra] = result;
      if (ph === rh && pa === ra) return 3;
      if (ph === ra && pa === rh && ph !== pa) return -2;
      const ps = Math.sign(ph - pa);
      const rs = Math.sign(rh - ra);
      if (ps === rs) return 1;
      return 0;
    }

    function recomputeGame(gIndex) {
      const hInput = container.querySelector(`.result-box[data-game="${gIndex}"][data-side="h"]`);
      const aInput = container.querySelector(`.result-box[data-game="${gIndex}"][data-side="a"]`);
      const hasResult = hInput.value !== "" && aInput.value !== "";
      const result = hasResult ? [parseInt(hInput.value, 10), parseInt(aInput.value, 10)] : null;

      container.querySelectorAll(`.pts[data-game="${gIndex}"]`).forEach(span => {
        if (!result) {
          span.innerHTML = "&nbsp;";
          span.className = "pts pts-hidden";
          return;
        }
        const pred = parseScore(span.dataset.pred);
        const points = pred ? computePoints(pred, result) : 0;
        if (points === 0) {
          span.innerHTML = "&nbsp;";
          span.className = "pts pts-hidden";
          return;
        }
        span.textContent = points > 0 ? `+${points}` : `${points}`;
        const cls = points === 3 ? "pts-pos"
          : points === 1 ? "pts-one"
          : "pts-neg";
        span.className = "pts " + cls;
      });

      updateTotals();
    }

    // Soma o score dos jogos para cada jogador e atualiza os boxes azuis.
    // Se 'upToDate' (YYYY-MM-DD) for informado, considera apenas os jogos até
    // aquele dia (inclusive) — acumulando do primeiro dia até o selecionado.
    function computeParticipantTotal(pIndex, upToDate) {
      let total = 0;
      games.forEach(g => {
        if (upToDate && g.d > upToDate) return;
        const r = resultsData[gameKey(g)];
        if (!r || r.h === "" || r.h == null || r.a === "" || r.a == null) return;
        const result = [parseInt(r.h, 10), parseInt(r.a, 10)];
        if (Number.isNaN(result[0]) || Number.isNaN(result[1])) return;
        const pred = parseScore(g.p[pIndex]);
        if (pred) total += computePoints(pred, result);
      });
      return total;
    }

    // Detalha, por jogador, quantos palpites renderam +3, +1, 0 e -2,
    // além do total de pontos. Considera apenas jogos com placar lançado.
    function computeParticipantBreakdown(pIndex) {
      let c3 = 0, c1 = 0, c0 = 0, cNeg = 0, total = 0;
      games.forEach(g => {
        const r = resultsData[gameKey(g)];
        if (!r || r.h === "" || r.h == null || r.a === "" || r.a == null) return;
        const result = [parseInt(r.h, 10), parseInt(r.a, 10)];
        if (Number.isNaN(result[0]) || Number.isNaN(result[1])) return;
        const pred = parseScore(g.p[pIndex]);
        if (!pred) return;
        const pts = computePoints(pred, result);
        if (pts === 3) c3++;
        else if (pts === 1) c1++;
        else if (pts === -2) cNeg++;
        else c0++;
        total += pts;
      });
      return { c3, c1, c0, cNeg, total };
    }

    function updateTotals() {
      const upToDate = dateInput.value;
      const boxes = Array.from(container.querySelectorAll(".total-box"));
      const totals = boxes.map(box => computeParticipantTotal(parseInt(box.dataset.participant, 10), upToDate));

      // Há ao menos um placar lançado até o dia selecionado?
      const hasAnyResult = games.some(g => {
        if (upToDate && g.d > upToDate) return false;
        const r = resultsData[gameKey(g)];
        return r && r.h !== "" && r.h != null && r.a !== "" && r.a != null;
      });

      // Três maiores pontuações distintas
      const distinct = [...new Set(totals)].sort((a, b) => b - a);
      const first = distinct[0];
      const second = distinct[1];
      const third = distinct[2];

      boxes.forEach((box, i) => {
        const total = totals[i];
        box.textContent = total;
        let rank = "rank-none";
        if (hasAnyResult) {
          if (total === first) rank = "rank-1";
          else if (total === second) rank = "rank-2";
          else if (total === third) rank = "rank-3";
        }
        box.className = "total-box " + rank;
      });
    }

    dateInput.addEventListener("change", () => {
      fetchResults().then(render);
    });

    // Ao abrir, seleciona a data de hoje (limitada ao período do torneio)
    (function setInitialDate() {
      const now = new Date();
      const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
      let target = today;
      if (dateInput.min && target < dateInput.min) target = dateInput.min;
      if (dateInput.max && target > dateInput.max) target = dateInput.max;
      dateInput.value = target;
    })();

    resultsData = loadCache();
    render();
    applyScale();
    fetchResults().then(render);
  </script>
</body>
</html>

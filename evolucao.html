<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolução do Placar Geral — Pista de corrida</title>
<style>
  :root{
    --bg1:#0f172a; --bg2:#1e293b;
    --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --accent:#0094C8; --accent2:#c2620d; --gold:#f59e0b;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:radial-gradient(1200px 600px at 20% -10%,#1d4ed8 0%,transparent 55%),
               radial-gradient(1000px 500px at 100% 0%,#0ea5b7 0%,transparent 50%),
               linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100vh; padding:12px 12px 16px;
  }
  .wrap{max-width:1080px; margin:0 auto}
  h1{color:#fff; font-size:1.6rem; margin:0 0 4px; letter-spacing:-.3px}
  .sub{color:#cbd5e1; font-size:.92rem; margin:0 0 22px}
  .seg{
    display:inline-flex; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18);
    padding:5px; border-radius:999px; gap:4px; backdrop-filter:blur(6px); margin-bottom:22px;
  }
  .seg button{
    border:0; background:transparent; color:#e2e8f0; font-weight:700; font-size:.9rem;
    padding:9px 18px; border-radius:999px; cursor:pointer; transition:.2s; white-space:nowrap;
  }
  .seg button.active{background:#fff; color:var(--ink); box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .card{
    background:var(--card); border-radius:18px; padding:12px 14px 10px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.5); position:relative; overflow:hidden;
  }
  .card h2{margin:0 0 6px; font-size:1rem}
  .card .desc{margin:0 0 16px; color:var(--muted); font-size:.86rem}
  .panel{display:none}
  .panel.active{display:block; animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  svg{display:block; width:100%; height:auto; overflow:visible}
  .legend{display:flex; flex-wrap:wrap; gap:6px 12px; margin-top:14px}
  .lg{display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:#334155; cursor:pointer; padding:2px 4px; border-radius:6px; transition:.15s}
  .lg:hover{background:#f1f5f9}
  .lg .sw{width:11px; height:11px; border-radius:3px; flex:0 0 auto}
  .lg.dim{opacity:.35}
  .axis{fill:#94a3b8; font-size:11px}
  .grid{stroke:#eef2f7; stroke-width:1}
  .endlbl{font-size:11px; font-weight:700}
  .hoverbox{
    position:absolute; pointer-events:none; background:#0f172a; color:#fff; border-radius:12px;
    padding:10px 12px; font-size:.78rem; box-shadow:0 12px 30px rgba(0,0,0,.35); opacity:0; transition:opacity .12s;
    min-width:150px; z-index:5;
  }
  .hoverbox b{display:block; margin-bottom:6px; color:#7dd3fc; font-size:.8rem}
  .hoverbox .row{display:flex; justify-content:space-between; gap:14px; line-height:1.5}
  .hoverbox .row span:first-child{display:inline-flex;align-items:center;gap:6px}
  .hoverbox .dot{width:8px;height:8px;border-radius:50%}
  /* Bar race */
  .race-controls{display:flex; align-items:center; gap:12px; margin-bottom:8px}
  .play{
    border:0; width:18px; height:18px; border-radius:50%; cursor:pointer; flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),#1d4ed8); color:#fff;
    box-shadow:0 8px 20px -6px var(--accent); display:flex; align-items:center; justify-content:center;
    line-height:0; padding:0;
  }
  .play svg{width:87%; height:87%; display:block}
  .race-controls input[type=range]{
    flex:1; accent-color:var(--accent); -webkit-appearance:none; appearance:none;
    height:4px; border-radius:999px; background:#cbd5e1; cursor:pointer;
  }
  .race-controls input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:10px; height:10px; border-radius:50%;
    background:var(--accent); border:0; box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  .race-controls input[type=range]::-moz-range-thumb{
    width:10px; height:10px; border-radius:50%; background:var(--accent); border:0;
  }
  .race-controls input[type=range]::-moz-range-track{
    height:4px; border-radius:999px; background:#cbd5e1;
  }
  .daybig{font-weight:800; font-size:1.05rem; min-width:64px; text-align:right; font-variant-numeric:tabular-nums}
  .bars{position:relative}
  .bar{
    position:absolute; left:0; right:0; height:30px; display:flex; align-items:center; gap:10px;
    transition:transform .7s cubic-bezier(.4,0,.2,1);
  }
  .bar .nm{width:84px; text-align:right; font-size:.8rem; font-weight:600; flex:0 0 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bar .track{flex:1; height:22px; position:relative}
  .bar .fill{
    height:100%; border-radius:0 8px 8px 0; transition:width .7s cubic-bezier(.4,0,.2,1);
    display:flex; align-items:center; justify-content:flex-end; padding-right:8px; color:#fff;
    font-size:.74rem; font-weight:800; min-width:30px;
  }
  /* Corrida de colunas (jogadores na horizontal) */
  .cols{position:relative; height:330px; margin-top:6px}
  .col{
    position:absolute; bottom:34px; width:30px; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; transition:left .7s cubic-bezier(.4,0,.2,1);
  }
  .col .cval{font-size:.72rem; font-weight:800; margin-bottom:3px; color:#334155; font-variant-numeric:tabular-nums}
  .col .cbar{width:24px; border-radius:7px 7px 0 0; transition:height .7s cubic-bezier(.4,0,.2,1)}
  .col .cnm{
    position:absolute; bottom:-30px; font-size:.66rem; font-weight:600; color:#475569;
    transform:rotate(-42deg); transform-origin:right top; white-space:nowrap; right:8px;
  }
  /* Pista de corrida */
  .track{position:relative; margin-top:4px}
  .lane{
    position:relative; height:25px; display:flex; align-items:center; cursor:pointer; border-radius:6px;
    transition:background .2s;
  }
  .lane:hover{background:#f1f5f9}
  .lane.hl{background:#dcfce7}
  .lane.hl:hover{background:#bbf7d0}
  .lane + .lane{border-top:1px dashed #eef2f7}
  .lscore{flex:0 0 28px; text-align:right; padding-right:8px; font-size:.7rem; font-weight:800; color:#334155; font-variant-numeric:tabular-nums}
  .run{position:relative; flex:1; height:100%; border-left:2px solid #e2e8f0}
  .finish{position:absolute; top:0; bottom:0; right:0; width:3px; background:repeating-linear-gradient(45deg,#0f172a 0 5px,#fff 5px 10px); border-radius:2px}
  .runner{
    position:absolute; left:0; top:50%; transform:translateY(-50%);
    transition:left .7s cubic-bezier(.4,0,.2,1);
  }
  .horse{position:relative; width:42px; height:28px}
  .horse-fill{
    position:absolute; inset:0; background:#ffffff;
    -webkit-mask:url('Cavalo.png') center/contain no-repeat;
    mask:url('Cavalo.png') center/contain no-repeat;
    transition:background .4s;
  }
  .horse-img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; mix-blend-mode:multiply; pointer-events:none}
  .horse-name{
    position:absolute; left:47%; top:47%; transform:translate(-50%,calc(-50% - 2px));
    font-size:.6rem; font-weight:800; color:#0f172a; white-space:nowrap; letter-spacing:-.3px;
    text-shadow:0 1px 2px rgba(255,255,255,.7); transition:color .4s; pointer-events:none;
  }
  .note{color:#94a3b8; font-size:.72rem; margin-top:8px; text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <!-- PISTA DE CORRIDA -->
    <div class="panel active" id="p-track">
      <div class="race-controls">
        <button class="play" id="playBtnT">▶</button>
        <input type="range" id="raceSliderT" min="0" value="0">
        <div class="daybig" id="raceDayT"></div>
      </div>
      <div class="track" id="track"></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  dates: ["11/06","12/06","13/06","14/06","15/06","16/06","17/06","18/06","19/06","20/06","21/06","22/06","23/06","24/06"],
  series: [
    {name:"AnaLu",   p:[2,3,4,6,6,10,15,21,26,29,31,37,40,49]},
    {name:"Celeste", p:[2,3,7,10,10,16,18,20,24,27,32,33,35,43]},
    {name:"Daniel",  p:[1,1,2,7,8,13,15,18,21,24,26,31,34,45]},
    {name:"Danillo", p:[2,3,2,7,7,11,13,15,17,22,24,29,32,44]},
    {name:"Fábio",   p:[3,4,6,9,9,12,14,20,29,32,33,40,43,54]},
    {name:"Gerson",  p:[3,6,7,8,8,14,17,18,25,27,28,35,38,48]},
    {name:"Helena",  p:[1,2,3,5,6,10,13,14,17,21,23,30,33,47]},
    {name:"Henrique",p:[3,4,8,9,10,14,17,20,26,29,31,35,40,51]},
    {name:"Ju",      p:[6,6,7,9,10,18,19,22,27,32,36,39,42,53]},
    {name:"Juan",    p:[1,2,4,6,7,15,20,23,26,29,30,33,36,48]},
    {name:"Léo",     p:[2,2,1,4,4,7,6,7,11,14,16,21,24,36]},
    {name:"Lucca",   p:[6,6,5,6,6,11,14,16,21,24,25,30,33,44]},
    {name:"Luiz",    p:[3,4,5,7,7,13,15,17,20,25,27,32,35,46]},
    {name:"Mah",     p:[6,6,5,7,7,13,15,18,22,25,27,34,39,51]},
    {name:"Marcelo", p:[4,4,6,8,8,13,16,21,27,29,31,38,41,51]},
    {name:"Márcia",  p:[1,2,3,6,6,10,13,16,21,24,25,32,35,44]},
    {name:"Marina",  p:[4,4,7,8,11,16,17,20,23,26,29,35,38,51]},
    {name:"Monts",   p:[1,1,2,4,4,8,11,13,16,19,23,29,32,45]},
    {name:"Naty",    p:[2,2,3,5,5,9,11,16,19,24,25,31,36,45]},
    {name:"Paty",    p:[2,2,3,5,5,11,13,16,18,21,23,27,32,41]},
    {name:"Paula",   p:[3,4,4,5,6,10,11,14,21,25,26,30,32,47]},
    {name:"Rafael",  p:[1,2,1,3,4,7,9,12,17,18,20,27,32,43]}
  ]
};
// Dia inicial: todos zerados
DATA.dates.unshift('Início');
DATA.series.forEach(s=>s.p.unshift(0));
const D = DATA.dates.length;
const N = DATA.series.length;
// Cor fixa por jogador (consistente entre as 3 opções)
const COLORS = DATA.series.map((_,i)=>`hsl(${Math.round(360*i/N)} 68% 48%)`);
DATA.series.forEach((s,i)=>{ s.color=COLORS[i]; s.idx=i; });
const SVGNS="http://www.w3.org/2000/svg";
function el(tag,attrs){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
// Catmull-Rom -> path suave
function smooth(pts){
  if(pts.length<2) return "";
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${c1x},${c1y} ${c2x},${c2y} ${p2[0]},${p2[1]}`;
  }
  return d;
}
function rankPerDay(){
  // ranks[day] = map idx->rank
  const ranks=[];
  for(let d=0; d<D; d++){
    const order=DATA.series.map(s=>({i:s.idx, v:s.p[d], n:s.name}))
      .sort((a,b)=> b.v-a.v || a.n.localeCompare(b.n,'pt-BR'));
    const m={}; order.forEach((o,k)=> m[o.i]=k+1);
    ranks.push(m);
  }
  return ranks;
}
const RANKS=rankPerDay();
const finalRankOf = {}; // idx -> final rank
DATA.series.forEach(s=> finalRankOf[s.idx]=RANKS[D-1][s.idx]);
const topIdx = DATA.series.slice().sort((a,b)=>finalRankOf[a.idx]-finalRankOf[b.idx]).slice(0,5).map(s=>s.idx);

/* ===== Helper de reprodução (play/slider) reutilizável ===== */
const GMAX=Math.max(...DATA.series.map(s=>Math.max(...s.p)));
const REFRESH={};
const ICON={
  play:'<svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="8,5 8,19 19,12" fill="currentColor"/></svg>',
  pause:'<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="6" width="3" height="12" fill="currentColor"/><rect x="13" y="6" width="3" height="12" fill="currentColor"/></svg>',
  stop:'<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="7" width="10" height="10" fill="currentColor"/></svg>'
};
function wirePlay(playBtn,slider,frame){
  slider.max=D-1;
  let timer=null;
  let finished=false;
  function clearTimer(){if(timer){clearInterval(timer);timer=null;}}
  function setIdle(){clearTimer();finished=false;playBtn.innerHTML=ICON.play;}
  function setFinished(){clearTimer();finished=true;playBtn.innerHTML=ICON.stop;}
  slider.oninput=()=>{clearTimer();finished=false;playBtn.innerHTML=ICON.play;frame(+slider.value);};
  playBtn.innerHTML=ICON.play;
  playBtn.onclick=()=>{
    if(finished){slider.value=0;frame(0);setIdle();return;}   // stop → volta ao início
    if(timer){clearTimer();playBtn.innerHTML=ICON.play;return;}   // pausa
    playBtn.innerHTML=ICON.pause;
    if(+slider.value>=D-1){slider.value=0;frame(0);}
    timer=setInterval(()=>{let d=+slider.value; if(d>=D-1){setFinished();return;} slider.value=d+1; frame(d+1);},850);
  };
  return {frame};
}

/* ============ PISTA DE CORRIDA ============ */
(function(){
  const track=document.getElementById('track');
  const lanes={};
  let hlLane=null;
  // ordem fixa por nome (cada um na sua raia)
  const ordered=DATA.series.slice().sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  ordered.forEach(s=>{
    const lane=document.createElement('div'); lane.className='lane';
    lane.innerHTML=`<span class="lscore">0</span><div class="run"><div class="runner"><div class="horse"><div class="horse-fill"></div><img class="horse-img" src="Cavalo.png" alt=""><span class="horse-name">${s.name}</span></div></div></div>`;
    lane.addEventListener('click',()=>{
      if(hlLane===lane){lane.classList.remove('hl');hlLane=null;return;}
      if(hlLane)hlLane.classList.remove('hl');
      lane.classList.add('hl');hlLane=lane;
    });
    track.appendChild(lane);
    lanes[s.idx]={runner:lane.querySelector('.runner'),fill:lane.querySelector('.horse-fill'),name:lane.querySelector('.horse-name'),score:lane.querySelector('.lscore')};
  });
  const fin=document.createElement('div'); fin.className='finish'; track.appendChild(fin);
  // Cores do pódio (iguais ao placar geral)
  const RC={1:{bg:'#FFD700',fg:'#000'},2:{bg:'#C0C0C0',fg:'#000'},3:{bg:'#E0A878',fg:'#000'}};
  // Cores das duas piores posições
  const LAST={bg:'#EF4444',fg:'#fff'};   // vermelho (último)
  const PENULT={bg:'#F9A8D4',fg:'#000'}; // rosa (penúltimo)
  function frame(day){
    const distinct=[...new Set(DATA.series.map(s=>s.p[day]))].sort((a,b)=>b-a);
    const first=distinct[0], second=distinct[1], third=distinct[2];
    const last=distinct[distinct.length-1], penult=distinct[distinct.length-2];
    DATA.series.forEach(s=>{
      const L=lanes[s.idx], v=s.p[day];
      L.runner.style.left=(GMAX?(v/GMAX):0)*85+'%';
      L.score.textContent=v;
      let c=null;
      if(v>0){
        if(v===first) c=RC[1];
        else if(v===second) c=RC[2];
        else if(v===third) c=RC[3];
        else if(v===last) c=LAST;
        else if(v===penult) c=PENULT;
      }
      L.fill.style.background=c?c.bg:'#ffffff';
      L.name.style.color='#000';
    });
    document.getElementById('raceDayT').textContent=DATA.dates[day];
  }
  wirePlay(document.getElementById('playBtnT'),document.getElementById('raceSliderT'),frame);
  frame(0);
})();
</script>
</body>
</html>
